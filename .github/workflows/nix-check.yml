name: nix-check

on:
  push:
    branches:
      - main
    paths:
      - flake.nix
      - flake.lock
      - nix/**
      - pnpm-lock.yaml
      - package.json
      - pnpm-workspace.yaml
      - apps/**/package.json
      - packages/**/package.json
      - tools/**/package.json
      - e2e/package.json
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # - name: Configure Cachix (always pull; push only with token)
      #   uses: cachix/cachix-action@v15
      #   with:
      #     name: nexu-open-design
      #     # Empty token = read-only mode. Forks/PRs from external
      #     # contributors still get cache hits but cannot push back.
      #     authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      #     skipPush: ${{ secrets.CACHIX_AUTH_TOKEN == '' }}

      - name: nix flake check
        run: |
          set -o pipefail
          if ! nix flake check --print-build-logs --keep-going 2>&1 | tee nix-check.log; then
            got_hash="$(grep -E '^\s+got:\s+' nix-check.log | head -1 | awk '{print $2}')"
            if [ -n "$got_hash" ]; then
              echo "::error title=Stale pnpmDepsHash::Set pnpmDepsHash in nix/package-daemon.nix and nix/package-web.nix to ${got_hash} (see nix/README.md)."
            fi
            exit 1
          fi
