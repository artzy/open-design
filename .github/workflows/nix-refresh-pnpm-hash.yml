name: nix-refresh-pnpm-hash

# Recomputes pnpmDepsHash after pnpm-lock.yaml changes and opens a PR.
# Maintainer workflow — run manually from Actions when nix-check fails with
# a hash mismatch on main.

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Compute pnpmDepsHash
        id: hash
        run: |
          set -euo pipefail
          for f in nix/package-daemon.nix nix/package-web.nix; do
            sed -i 's/pnpmDepsHash = "sha256-[^"]*";/pnpmDepsHash = lib.fakeHash;/' "$f"
          done
          if ! nix build .#daemon 2>&1 | tee nix-build.log; then
            got_hash="$(grep -E '^\s+got:\s+' nix-build.log | head -1 | awk '{print $2}')"
            if [ -z "$got_hash" ]; then
              echo '::error::Could not extract pnpmDepsHash from nix build log'
              tail -n 80 nix-build.log
              exit 1
            fi
            echo "hash=$got_hash" >> "$GITHUB_OUTPUT"
          else
            echo '::notice::Daemon already built — lockfile hash may already be correct'
            exit 0
          fi

      - name: Apply hash and verify
        run: |
          set -euo pipefail
          hash='${{ steps.hash.outputs.hash }}'
          for f in nix/package-daemon.nix nix/package-web.nix; do
            sed -i "s|pnpmDepsHash = lib.fakeHash;|pnpmDepsHash = \"$hash\";|" "$f"
          done
          nix flake check --print-build-logs --keep-going

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/nix-refresh-pnpm-hash
          delete-branch: true
          commit-message: 'fix(nix): refresh pnpmDepsHash'
          title: 'fix(nix): refresh pnpmDepsHash'
          body: |
            Refreshes `pnpmDepsHash` in `nix/package-daemon.nix` and
            `nix/package-web.nix` after `pnpm-lock.yaml` drift.

            Generated by the `nix-refresh-pnpm-hash` workflow.
